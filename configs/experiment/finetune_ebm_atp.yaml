# @package _global_

# to execute this experiment run:
# python train.py experiment=finetune_ebm_atp

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /dataset: generated_single_mol
  - override /energy: atp
  - override /ebm: default
  - override /flow: vfv2
  - override /optimizer: adam
  - override /scheduler: reduce_on_plateau

seed: 12345

task_name: "finetune_ebm"

tags: ["Finetune", "EBM", "ATP", "300K"]

logger:
  wandb:
    tags: ${tags}
    group: "ebm"

dataset:
  pdb_id: "alanine_tripeptide"

interpolant:
  _partial_: true
  plan: null

flow:
  n_features: 36

optimizer:
  lr: 5e-4

#########################
# custom fields 
#########################

ebm:
  net:
    num_features: 36
    num_layers: 8

plans:
  flow_plan:
    _target_: aita.plans.TrigPlan
    coupling_plan: "ot"
  ebm_plan:
    _target_: aita.plans.TrigPlanLite

ebm_ckpt: ${paths.root_dir}/checkpoints/atp/ebm_ema_model_300K.pth
flow_model_ckpt: ${paths.root_dir}/checkpoints/atp/flow_ema_model_300K.pth
flow_samples_path: null

ebm_inspection_interval: 50

sample_from_flow:
  output_path: ${paths.output_dir}/alanine_tripeptide_samples.npy
  pdb_path: ${paths.data_dir}/debug/alanine_tripeptide.pdb
  n_samples: 100_000
  samples_per_batch: 5_000
  n_timesteps: 100
  method: "dopri5"
  tsr_params: null