# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /dataset: simulated
  - override /optimizer: adam
  - override /scheduler: reduce_on_plateau
  - override /flow: vfv2

seed: 12345

task_name: "pretrain_transferable_flow"

tags: ["Pretrain", "Flow", "Transferable", "Temperature"]

logger:
  wandb:
    tags: ${tags}
    group: "flow"

dataset:
  param: "1200"
  anneal_type: "temperature"
  split_json_filename: "dipeptide_split.json"

flow:
  n_features: 75

optimizer:
  lr: 1e-3