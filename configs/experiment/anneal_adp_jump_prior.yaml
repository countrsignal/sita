# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /dataset: generated_single_mol
  - override /energy: adp
  - override /ebm: default
  - override /flow: vfv2
  - override /optimizer: adam
  - override /scheduler: reduce_on_plateau

seed: 12345

task_name: "anneal_adp"

tags: ["Bootstrap", "ADP", "Jump-Prior"]

logger:
  wandb:
    tags: ${tags}

dataset:
  pdb_id: "alanine_dipeptide"

interpolant:
  _partial_: true
  plan: null

flow:
  n_features: 24

optimizer:
  lr: 5e-4

#########################
# custom fields 
#########################

temperature_ladder: [755, 555, 408, 300]
n_epochs_finetune_ebm: 250
n_epochs_finetune_flow: 250
era_ckpt_dir: ${paths.output_dir}/era_ckpts
ebm_inspection_interval: 50
flow_inspection_interval: 50
ebm_model_ckpt: ${paths.root_dir}/experimental_results/ebm_ema_model_1200K.pth
flow_model_ckpt: ${paths.root_dir}/experimental_results/pretrain_flow/runs/2025-12-12_23-04-17/ema_model.pth
initial_flow_samples_path: null #${paths.root_dir}/experimental_results/flow_samples_1200K.npy
iw_quantile: 0.98

plans:
  flow_plan:
    _target_: aita.plans.TrigPlan
    coupling_plan: "ot"
  ebm_plan:
    _target_: aita.plans.TrigPlanLite

anneal_prior:
  prior_beta: 0.8

generate_ebm_dataset:
  n_samples: 100_000
  samples_per_batch: 5_000
  n_timesteps: 100
  method: "dopri5"
  tsr_params: null

generate_flow_samples:
  n_samples: 20_000
  samples_per_batch: 5_000
  n_timesteps: 100
  method: "dopri5"
  tsr_params: null