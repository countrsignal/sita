# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /dataset: generated_single_mol
  - override /energy: adp
  - override /ebm: default
  - override /flow: vfv2
  - override /optimizer: adam
  - override /scheduler: reduce_on_plateau

seed: 12345

task_name: "pretrain_ebm"

tags: ["Fit", "EBM", "ADP", "Temperature", "TSR"]

logger:
  wandb:
    tags: ${tags}
    group: "ebm"

dataset:
  pdb_id: "alanine_dipeptide"

interpolant:
  _partial_: true
  plan: null

flow:
  n_features: 24

optimizer:
  lr: 5e-4

#########################
# custom fields 
#########################

plans:
  flow_plan:
    _target_: aita.plans.TrigPlan
    coupling_plan: "ot"
  ebm_plan:
    _target_: aita.plans.TrigPlanLite

ebm_ckpt: ${paths.root_dir}/experimental_results/anneal_adp/runs/2025-12-15_23-53-11/era_ckpts/ebm_ema_model_1200K.pth
flow_model_ckpt: null # ${paths.root_dir}/experimental_results/pretrain_flow/runs/2025-11-17_12-59-00/ema_model.pth
flow_samples_path: ${paths.root_dir}/experimental_results/tsr_samples.npy

ebm_inspection_interval: 25

sample_from_flow:
  output_path: ${paths.output_dir}/alanine_dipeptide_samples.npy
  pdb_path: ${paths.data_dir}/debug/alanine_dipeptide.pdb
  n_samples: 100_000
  samples_per_batch: 5_000
  n_timesteps: 100
  method: "dopri5"
  tsr_params:
    k: ${div:1200,648}
    rho: 1.0