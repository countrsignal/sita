# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /dataset: generated
  - override /energy: adp
  - override /ebm: default
  - override /flow: vector_field
  - override /optimizer: adam
  - override /scheduler: reduce_on_plateau

seed: 12345

task_name: "pretrain_ebm"

tags: ["Fit", "EBM", "ADP", "Temperature"]

logger:
  wandb:
    tags: ${tags}
    group: "ebm"

dataset:
  debug_molecule: "alanine_dipeptide"

interpolant:
  _partial_: true
  plan: null

flow:
  n_features: 24

optimizer:
  lr: 5e-4

#########################
# custom fields 
#########################

plans:
  flow_plan:
    _target_: aita.plans.TrigPlan
    coupling_plan: "ot"
  ebm_plan:
    _target_: aita.plans.TrigPlanLite

flow_model_ckpt: ${paths.root_dir}/experimental_results/pretrain_flow/runs/2025-10-19_14-19-22/ema_model.pth

sample_from_flow:
  n_batches: 20
  samples_per_batch: 5000
  n_timesteps: 100