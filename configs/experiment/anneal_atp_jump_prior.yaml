# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /dataset: generated_single_mol
  - override /energy: atp
  - override /ebm: default
  - override /flow: vfv2
  - override /optimizer: adam
  - override /scheduler: reduce_on_plateau

seed: 12345

task_name: "anneal_atp"

tags: ["Bootstrap", "ATP", "Jump-Prior", "Root-Temp-Ratio", "EBM-400epochs", "Flow-200epochs", "Q99"]

logger:
  wandb:
    tags: ${tags}

dataset:
  pdb_id: "alanine_tripeptide"

interpolant:
  _partial_: true
  plan: null

flow:
  n_features: 36

ebm:
  net:
    num_features: 36
    num_layers: 8

optimizer:
  lr: 1e-3

#########################
# custom fields 
#########################

temperature_ladder: [755.95, 555.52, 408.24, 300.00]
n_epochs_finetune_ebm: [400, 400, 400, 400] # <<!>> LONG EBM
batch_size_finetune_ebm: 512
n_epochs_finetune_flow: [200, 200, 200, 200]
batch_size_finetune_flow: 400
era_ckpt_dir: ${paths.output_dir}/era_ckpts
ebm_inspection_interval: 50
flow_inspection_interval: 50

# ${paths.root_dir}/experimental_results/ebm_ema_model_1200K.pth
ebm_model_ckpt: ${paths.root_dir}/experimental_results/pretrain_ebm/runs/2026-03-27_13-59-59/ema_model.pth

flow_model_ckpt: ${paths.root_dir}/experimental_results/pretrain_flow/runs/2026-03-15_11-58-15/ema_model.pth
initial_flow_samples_path: null #${paths.root_dir}/experimental_results/flow_samples_1200K.npy

iw_quantile: 0.99
n_iw_samples: 100_000 # NOTE: this sets the number of samples to fine-tune the flow
anneal_prior: true

plans:
  flow_plan:
    _target_: aita.plans.TrigPlan
    coupling_plan: "ot"
  ebm_plan:
    _target_: aita.plans.TrigPlanLite

generate_ebm_dataset:
  n_samples: 200_000
  samples_per_batch: 5_000
  n_timesteps: 100
  method: "dopri5"
  tsr_params: null

generate_flow_samples:
  n_samples: 30_000
  samples_per_batch: 5_000
  n_timesteps: 100
  method: "dopri5"
  tsr_params: null